name: Daily hostel market update

on:
  schedule:
    - cron: "10 21 * * *"
  workflow_dispatch:

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      AGODA_COMPETITOR_HOSTEL_HARU_URL: ${{ secrets.AGODA_COMPETITOR_HOSTEL_HARU_URL }}
      AGODA_COMPETITOR_SEOUL_CUBE_URL: ${{ secrets.AGODA_COMPETITOR_SEOUL_CUBE_URL }}
      AGODA_COMPETITOR_MYEONGDONG_STAY_URL: ${{ secrets.AGODA_COMPETITOR_MYEONGDONG_STAY_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run daily:update
